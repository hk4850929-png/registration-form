<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Registration Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <!-- Top Label -->
    <div class="eyebrow">
        <span></span>
        <p>CYBER PORTAL • REGISTER</p>
        <span class="right"></span>
    </div>

    <!-- Heading -->
    <h1>Join Our Community</h1>

    <p class="subtitle">
        Create your account and begin your learning journey today.
    </p>

    <form>

        <!-- Full Name -->
        <div class="field">
            <label for="fullname">Full Name <span class="req">*</span></label>

            <div class="input-shell">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>

                <input
                    type="text"
                    id="fullname"
                    name="fullname"
                    placeholder="Enter your full name"
                    required>
            </div>
        </div>

        <!-- Email -->
        <div class="field">
            <label for="email">Email Address <span class="req">*</span></label>

            <div class="input-shell">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="m22 6-10 7L2 6"/>
                </svg>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="example@email.com"
                    required>
            </div>
        </div>

        <!-- Password -->
        <div class="field">
            <label for="password">Password <span class="req">*</span></label>

            <div class="input-shell">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a strong password"
                    minlength="6"
                    required>
            </div>

            <small class="hint">
                Password must contain at least 6 characters.
            </small>
        </div>

        <!-- Gender -->
        <div class="field">
            <label>Gender <span class="req">*</span></label>

            <div class="gender-group">

                <input type="radio" id="male" name="gender" value="Male" required>
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>

            </div>
        </div>

        <!-- Course -->
        <div class="field">
            <label for="course">Choose Your Course <span class="req">*</span></label>

            <select id="course" name="course" required>

                <option value="" disabled selected>
                    Select Your Course
                </option>

                <option>Frontend Development</option>
                <option>Backend Development</option>
                <option>Full Stack Development</option>
                <option>Data Science</option>
                <option>UI / UX Design</option>
                <option>Artificial Intelligence</option>
                <option>Cyber Security</option>

            </select>

        </div>

        <!-- Button -->
        <button type="submit">

            <span>Create Account</span>

            <svg class="btn-arrow"
                viewBox="0 0 24 24"
                fill="none"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round">

                <path d="M5 12h14"/>
                <path d="M13 6l6 6-6 6"/>

            </svg>

        </button>

    </form>

    <footer>
        © 2026 Cyber Learning Portal • All Rights Reserved
    </footer>

</div>

</body>
</html>
